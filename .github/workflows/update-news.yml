name: Update political news

on:
  workflow_dispatch:
  schedule:
    # Refreshes the Analysis news links every day at 12:43 UTC.
    - cron: "43 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-political-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Refresh political news
        run: npm run update-news

      - name: Commit updated news
        run: |
          if [ -n "$(git status --porcelain data/news.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/news.json
            git commit -m "Update political news"
            git push
          else
            echo "No new political articles to commit."
          fi
