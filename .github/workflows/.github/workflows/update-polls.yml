name: Update polling data

on:
  workflow_dispatch:
  schedule:
    # Runs every 2 days at 10:17 UTC.
    - cron: "17 10 */2 * *"

permissions:
  contents: write

concurrency:
  group: update-polling-data
  cancel-in-progress: false

jobs:
  update-polls:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        # This repo does not need package-lock.json for the workflow.
        run: npm install --no-package-lock

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run poll scraper
        run: npm run update-polls

      - name: Commit updated data files
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/polling.json data/polling-history.json
            git commit -m "Update polling data"
            git push
          else
            echo "No polling data changes to commit."
          fi
